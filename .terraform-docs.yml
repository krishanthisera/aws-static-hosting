formatter: 'markdown table'

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

sections:
  show:
    - requirements
    - providers
    - resources
    - inputs
    - outputs

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: true
  required: true
  sensitive: true
  type: true
